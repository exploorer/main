<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка изображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f1e;
            color: #ffffff;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Форма загрузки */
        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #ec4899;
            background: rgba(236, 72, 153, 0.05);
        }

        .upload-area.dragover {
            border-color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .upload-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: #94a3b8;
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: #ffffff;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        /* Галерея */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            border-color: rgba(236, 72, 153, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
        }

        .gallery-item:hover .delete-btn {
            opacity: 1;
        }

        .gallery-item .delete-btn:hover {
            background: #ef4444;
        }

        .empty-gallery {
            grid-column: 1 / -1;
            text-align: center;
            color: #475569;
            padding: 60px 20px;
            font-size: 18px;
        }

        /* Инфо панель */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .info-panel .count {
            color: #94a3b8;
            font-size: 14px;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Галерея изображений</h1>
        <p class="subtitle">Загружайте картинки до 24 МБ — они покажутся здесь</p>

        <!-- Область загрузки -->
        <div class="upload-area" id="uploadArea">
            <span class="upload-icon">📤</span>
            <div class="upload-text">Перетащите сюда изображения</div>
            <div class="upload-hint">или нажмите, чтобы выбрать файлы</div>
            <input type="file" class="file-input" id="fileInput" accept="image/*" multiple>
            <button class="btn" id="uploadBtn">Выбрать файлы</button>
        </div>

        <!-- Информация -->
        <div class="info-panel">
            <span class="count" id="imageCount">Загружено: 0 изображений</span>
            <button class="btn btn-secondary" id="clearBtn">🗑️ Очистить все</button>
        </div>

        <!-- Галерея -->
        <div class="gallery" id="gallery">
            <div class="empty-gallery">Пока нет изображений. Загрузите первое! 🚀</div>
        </div>
    </div>

    <script>
        (function() {
            // === СОСТОЯНИЕ ===
            let images = []; // массив объектов { id, dataURL }

            // === DOM ===
            const gallery = document.getElementById('gallery');
            const fileInput = document.getElementById('fileInput');
            const uploadArea = document.getElementById('uploadArea');
            const uploadBtn = document.getElementById('uploadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const imageCount = document.getElementById('imageCount');

            // === ЗАГРУЗКА ===
            function loadImages(files) {
                for (const file of files) {
                    if (!file.type.startsWith('image/')) {
                        continue;
                    }
                    // Проверка размера (24 МБ)
                    if (file.size > 24 * 1024 * 1024) {
                        alert(`Файл "${file.name}" превышает 24 МБ (${(file.size / 1024 / 1024).toFixed(1)} МБ)`);
                        continue;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const id = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
                        images.push({
                            id: id,
                            dataURL: e.target.result
                        });
                        renderGallery();
                    };
                    reader.readAsDataURL(file);
                }
            }

            // === ОТОБРАЖЕНИЕ ===
            function renderGallery() {
                if (images.length === 0) {
                    gallery.innerHTML = `<div class="empty-gallery">Пока нет изображений. Загрузите первое! 🚀</div>`;
                    imageCount.textContent = 'Загружено: 0 изображений';
                    return;
                }

                let html = '';
                images.forEach((img, index) => {
                    html += `
                        <div class="gallery-item">
                            <img src="${img.dataURL}" alt="Изображение ${index + 1}" loading="lazy">
                            <button class="delete-btn" data-id="${img.id}">✕</button>
                        </div>
                    `;
                });
                gallery.innerHTML = html;
                imageCount.textContent = `Загружено: ${images.length} изображений`;

                // Обработчики удаления
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.getAttribute('data-id');
                        images = images.filter(img => img.id !== id);
                        renderGallery();
                    });
                });
            }

            // === ОЧИСТКА ВСЕХ ===
            function clearAll() {
                if (images.length === 0) return;
                if (confirm('Удалить все изображения?')) {
                    images = [];
                    renderGallery();
                }
            }

            // === СОБЫТИЯ ===
            // Кнопка "Выбрать файлы"
            uploadBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                fileInput.click();
            });

            // Клик по области загрузки
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });

            // Выбор файлов через input
            fileInput.addEventListener('change', function(e) {
                if (this.files.length > 0) {
                    loadImages(this.files);
                    this.value = ''; // сброс
                }
            });

            // Drag & Drop
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    loadImages(e.dataTransfer.files);
                }
            });

            // Очистка
            clearBtn.addEventListener('click', clearAll);

            // === ПРИ ЗАГРУЗКЕ ===
            // Начинаем с пустой галереи
            renderGallery();

            // === ДОПОЛНИТЕЛЬНО: Восстановление из localStorage ===
            // Можно добавить сохранение, но изображения большие, лучше не хранить в localStorage
        })();
    </script>
</body>
</html>
